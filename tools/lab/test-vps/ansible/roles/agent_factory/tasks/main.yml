---
- name: Create Factory config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.factory"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed Factory MCP fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/mcp/factory-mcp.json"
    dest: "{{ profile_home }}/.factory/mcp.json"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"
