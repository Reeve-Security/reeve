---
- name: Create Codex CLI config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.codex"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed Codex CLI approval fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/approvals/codex-cli-danger.toml"
    dest: "{{ profile_home }}/.codex/config.toml"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"
