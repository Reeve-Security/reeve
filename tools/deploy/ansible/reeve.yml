---
- name: Install Reeve endpoint scan
  hosts: all
  become: true
  vars:
    reeve_bin: /usr/local/bin/aibom-cli
    reeve_scan_dir: /var/lib/reeve/scans
    reeve_config_dir: /etc/reeve
  tasks:
    - name: Create Reeve directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /usr/local/bin
        - "{{ reeve_config_dir }}"
        - "{{ reeve_scan_dir }}"

    - name: Create temporary directory for binary verification
      ansible.builtin.tempfile:
        state: directory
        prefix: reeve-verify-
      register: reeve_verify_tmp

    - name: Reject non-https binary URL
      ansible.builtin.assert:
        that:
          - reeve_binary_url is match('^https://')
        fail_msg: "reeve_binary_url must be https://, refusing to install an unverified binary"
      # Set reeve_allow_insecure_url=true ONLY for hermetic local tests against
      # a localhost http server. This never bypasses signature verification.
      when: not (reeve_allow_insecure_url | default(false) | bool)

    - name: Ensure cosign is available
      ansible.builtin.command:
        cmd: cosign version
      changed_when: false

    - name: Download Reeve binary to temporary path
      ansible.builtin.get_url:
        url: "{{ reeve_binary_url }}"
        dest: "{{ reeve_verify_tmp.path }}/aibom-cli"
        mode: "0600"

    - name: Download Reeve binary signature bundle to temporary path
      ansible.builtin.get_url:
        url: "{{ reeve_binary_bundle_url }}"
        dest: "{{ reeve_verify_tmp.path }}/aibom-cli.sigstore.json"
        mode: "0600"

    - name: Verify Reeve binary signature with cosign
      ansible.builtin.command:
        cmd: >-
          cosign verify-blob
          --bundle {{ reeve_verify_tmp.path }}/aibom-cli.sigstore.json
          --certificate-identity-regexp {{ reeve_signer_identity_regexp }}
          --certificate-oidc-issuer-regexp {{ reeve_signer_issuer_regexp }}
          {{ reeve_verify_tmp.path }}/aibom-cli
      register: reeve_cosign_verify
      changed_when: false
      failed_when: reeve_cosign_verify.rc != 0

    - name: Install verified Reeve binary
      ansible.builtin.copy:
        src: "{{ reeve_verify_tmp.path }}/aibom-cli"
        dest: "{{ reeve_bin }}"
        mode: "0755"
        remote_src: true

    - name: Remove temporary verification directory
      ansible.builtin.file:
        path: "{{ reeve_verify_tmp.path }}"
        state: absent

    - name: Install signed surface config
      ansible.builtin.get_url:
        url: "{{ reeve_surface_config_url }}"
        dest: "{{ reeve_config_dir }}/surfaces.yaml"
        mode: "0644"

    - name: Install surface config signature bundle
      ansible.builtin.get_url:
        url: "{{ reeve_surface_config_bundle_url }}"
        dest: "{{ reeve_config_dir }}/surfaces.yaml.sigstore.json"
        mode: "0644"

    - name: Install systemd service
      ansible.builtin.copy:
        dest: /etc/systemd/system/reeve-scan.service
        mode: "0644"
        content: |
          [Unit]
          Description=Reeve endpoint scan

          [Service]
          Type=oneshot
          ExecStart={{ reeve_bin }} scan --target /home --output-dir {{ reeve_scan_dir }} --require-signed-config --signer-identity-regexp {{ reeve_signer_identity_regexp }} --skip-sign

    - name: Install systemd timer
      ansible.builtin.copy:
        dest: /etc/systemd/system/reeve-scan.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Run Reeve endpoint scan daily

          [Timer]
          OnCalendar=*-*-* 02:17:00
          Persistent=true

          [Install]
          WantedBy=timers.target

    - name: Enable timer
      ansible.builtin.systemd:
        name: reeve-scan.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Verify signed config is accepted
      ansible.builtin.command:
        cmd: "{{ reeve_bin }} scope list --require-signed-config --signer-identity-regexp {{ reeve_signer_identity_regexp }}"
      changed_when: false
