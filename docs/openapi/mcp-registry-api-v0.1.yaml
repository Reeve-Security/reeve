openapi: 3.1.0
info:
  title: Reeve MCP Registry API
  version: 0.1.0-contract-slice
  description: |
    Contract-first slice for issue #115 backed by the published
    `datasets/mcp-servers/` artifacts. This document intentionally covers
    only the routes that can be answered deterministically from the
    current published dataset tree. Today that means publisher/package
    identity, title/description text, and declared hosted remotes.
    Capability-bearing fields are not part of
    the current official-registry seed path, so
    `/servers/by-capability/{capability}` remains deferred. The live
    upstream official-registry payload also still lacks stable package
    hash/digest fields and vulnerability-bearing fields, so
    `/servers/by-hash/{sha256}` and `/vulnerabilities/{server}` remain
    deferred and must not be synthesized from the current seed shape.

    Each published static JSON response body is accompanied by an
    adjacent detached Sigstore bundle at
    `<response>.json.sigstore.json`. Local fixture publication keeps the
    same public path shape with fixture-marked bundle contents.

    Current rate-limit policy: this static `api-fixtures/` surface has
    no application-enforced quota contract today. Clients should cache
    responses, avoid full-tree crawling when bounded index routes are
    available, and treat transport failures or future host-side
    throttling as soft errors. Any future runtime-backed per-client
    limits should ship as a new contract update.
servers:
  - url: https://example.invalid
paths:
  /servers/{publisher}/{name}:
    get:
      summary: Look up published registry records for a server name
      description: |
        Returns every published version for the matching
        `{publisher}/{name}` pair from the latest seed snapshot, newest
        first, with the latest version called out explicitly.
      parameters:
        - in: path
          name: publisher
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching records from the latest published dataset snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerLookupResponse"
  /servers/by-hosted-url/{transport}/{sha256}:
    get:
      summary: Look up latest published servers by a hosted transport endpoint
      description: |
        Returns the latest published server fixture paths whose declared
        hosted remotes normalize to the requested transport plus URL
        digest. The digest is the SHA-256 of
        `"{transport}\n{normalized-url}"`, where URL normalization trims
        surrounding whitespace and removes trailing slashes.
      parameters:
        - in: path
          name: transport
          required: true
          schema:
            type: string
            enum:
              - streamable-http
              - websocket
        - in: path
          name: sha256
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
      responses:
        "200":
          description: Matching latest published server fixture paths for the hosted endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HostedUrlLookupResponse"
  /search:
    get:
      summary: Search latest published servers by name and description tokens
      description: |
        Returns the latest published server record for each matching
        `{publisher}/{name}` pair from the latest seed snapshot.
        The current static contract slice materializes lowercased
        alphanumeric word tokens only; multi-token and ranked search
        remain deferred until a runtime-backed API exists.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: |
            Lowercased alphanumeric word token of length >=2 extracted
            from publisher, package name, title, or description text.
      responses:
        "200":
          description: Matching latest published server records for the normalized token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
components:
  schemas:
    SourcePointer:
      type: object
      additionalProperties: false
      required:
        - publishedDate
        - path
      properties:
        publishedDate:
          type: string
          format: date
        path:
          type: string
    RegistryRecord:
      type: object
      additionalProperties: true
      required:
        - id
        - dedupeKey
        - canonicalIdentity
        - registryMetadata
        - sourceRegistry
        - sourceUrl
    ServerLookupResponse:
      type: object
      additionalProperties: false
      required:
        - publisher
        - name
        - latestVersion
        - versions
        - snapshot
      properties:
        publisher:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        snapshot:
          $ref: "#/components/schemas/SourcePointer"
        versions:
          type: array
          items:
            $ref: "#/components/schemas/RegistryRecord"
    HostedUrlLookupResult:
      type: object
      additionalProperties: false
      required:
        - publisher
        - name
        - latestVersion
        - serverPath
      properties:
        publisher:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        serverPath:
          type: string
    HostedUrlLookupResponse:
      type: object
      additionalProperties: false
      required:
        - transport
        - url
        - sha256
        - snapshot
        - results
      properties:
        transport:
          type: string
          enum:
            - streamable-http
            - websocket
        url:
          type: string
        sha256:
          type: string
          pattern: "^[0-9a-f]{64}$"
        snapshot:
          $ref: "#/components/schemas/SourcePointer"
        results:
          type: array
          items:
            $ref: "#/components/schemas/HostedUrlLookupResult"
    SearchResult:
      type: object
      additionalProperties: false
      required:
        - publisher
        - name
        - latestVersion
        - title
        - description
        - matchedFields
        - serverPath
      properties:
        publisher:
          type: string
        name:
          type: string
        latestVersion:
          type: string
        title:
          type: string
        description:
          type: string
        matchedFields:
          type: array
          items:
            type: string
            enum:
              - publisher
              - name
              - title
              - description
        serverPath:
          type: string
    SearchResponse:
      type: object
      additionalProperties: false
      required:
        - query
        - snapshot
        - results
      properties:
        query:
          type: string
        snapshot:
          $ref: "#/components/schemas/SourcePointer"
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
