title = "Reeve repository boundary policy"

[extend]
useDefault = true

# Singular [allowlist] form: the CI gitleaks (8.24.2) does not honor the plural
# [[allowlists]] table, so all exemptions must live in this single block.
[allowlist]
description = "Repository fixtures, vendored spec data, and synthetic PEM detector fixtures"
paths = [
  '''^schema/fixtures/aibom-v0.1.0/''',
  '''^schema/fixtures/aibom-v0.1.0-v0\.2\.0/''',
  # Vendored CycloneDX spec schemas bundled as test fixtures (#474): the SPDX
  # license-ID list trips the generic-api-key entropy rule (license names look
  # like keys). Upstream spec content, no secrets.
  '''^crates/aibom-scanner/tests/data/cyclonedx/''',
]
# The former whole-file exemptions for the conversation secret-detector source
# (sensitive_data.rs / cli_e2e.rs) and the release smoke script were removed in
# #33: those files no longer embed any contiguous provider-shaped literal (every
# credential is assembled from split fragments at runtime, enforced by
# scripts/check-no-raw-provider-secrets.py). The detector's own private-key unit
# tests still embed synthetic PEM blocks (fake bodies, never real keys); exempt
# those by CONTENT (the PEM header) rather than by whole-file path, so the broad
# exemption stays gone and provider-shaped literals remain covered everywhere.
regexes = [
  '''-----BEGIN [A-Z0-9 ]{0,64}PRIVATE KEY-----''',
]

[[rules]]
id = "github-token-extended"
description = "GitHub token"
regex = '''\b(?:gh[opusr]_[A-Za-z0-9]{36,255}|github_pat_[A-Za-z0-9_]{20,255})\b'''
keywords = ["ghp_", "gho_", "ghu_", "ghs_", "ghr_", "github_pat_"]
