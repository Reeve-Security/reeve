---
- name: Create Claude Desktop config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.config/Claude"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed Claude Desktop MCP fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/mcp/claude-desktop-mcp.json"
    dest: "{{ profile_home }}/.config/Claude/claude_desktop_config.json"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"

