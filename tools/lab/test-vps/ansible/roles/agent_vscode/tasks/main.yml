---
- name: Create VS Code MCP config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.config/Code/User"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed VS Code MCP fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/mcp/vscode-mcp.json"
    dest: "{{ profile_home }}/.config/Code/User/mcp.json"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"
