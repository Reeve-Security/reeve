---
- name: Create Zed config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.config/zed"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed Zed MCP fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/mcp/zed-settings.json"
    dest: "{{ profile_home }}/.config/zed/settings.json"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"
