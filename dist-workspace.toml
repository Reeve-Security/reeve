[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Blacksmith runner overrides are defined below after all top-level `dist` keys.
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax).
# Windows is a signed binary-distribution target. Windows config-file
# discovery is supported by issue #57 Track 2; Windows profiling and sandbox
# enforcement remain deferred until later issue #57 tracks.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]

# cargo-dist derives matrix.runner from this mapping during `dist plan`; the
# generated release workflow intentionally keeps `runs-on: ${{ matrix.runner }}`.
#
# Keep the tiny OIDC-sensitive release host job on GitHub-hosted Linux in
# .github/workflows/release.yml, but build platform archives on Blacksmith to
# avoid GitHub-hosted macOS minute multipliers.
[dist.github-custom-runners]
"global" = { runner = "blacksmith-4vcpu-ubuntu-2204", host = "x86_64-unknown-linux-gnu" }
"aarch64-apple-darwin" = { runner = "blacksmith-6vcpu-macos-15", host = "aarch64-apple-darwin" }
"aarch64-unknown-linux-gnu" = { runner = "blacksmith-4vcpu-ubuntu-2204-arm", host = "aarch64-unknown-linux-gnu" }
"x86_64-apple-darwin" = { runner = "blacksmith-6vcpu-macos-15", host = "aarch64-apple-darwin" }
"x86_64-pc-windows-msvc" = { runner = "blacksmith-4vcpu-windows-2025", host = "x86_64-pc-windows-msvc" }
"x86_64-unknown-linux-gnu" = { runner = "blacksmith-4vcpu-ubuntu-2204", host = "x86_64-unknown-linux-gnu" }
