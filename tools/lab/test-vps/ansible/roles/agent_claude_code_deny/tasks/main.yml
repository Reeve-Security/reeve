---
- name: Create Claude Code config directory
  ansible.builtin.file:
    path: "{{ profile_home }}/.claude"
    state: directory
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0700"

- name: Seed Claude Code deny-heavy approval fixture
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/fixtures/approvals/claude-code-deny-heavy.json"
    dest: "{{ profile_home }}/.claude/settings.json"
    owner: "{{ profile_user }}"
    group: "{{ profile_user }}"
    mode: "0600"

